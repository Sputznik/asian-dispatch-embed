<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embed Test — Asian Dispatch</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { font-size: 1.2rem; color: #555; margin-bottom: 8px; }
    .label { font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 32px 0 8px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 20px; }
    .status { margin-top: 12px; font-size: 0.8rem; color: #888; }
    #iframe-height { font-weight: bold; color: #333; }
  </style>
</head>
<body>

  <h1>Asian Dispatch — Embed test page</h1>
  <p style="color:#888;font-size:.9rem;">
    This page simulates a partner website. The article below is embedded from
    <strong>ada.sputznik.io</strong> via an iframe. It should appear with full
    styles, no scrollbar, and resize to fit the content automatically.
  </p>

  <div class="label">Embed (post 2010)</div>
  <div class="card">

    <!-- ─── PASTE SNIPPET HERE ─── -->
    <div class="ad-embed" data-post="2010" data-title="Behind Vijay's Political Rise in Tamil Nadu: Of Dravidian Politics &amp; Youth Connect"></div>
    <script async src="https://ada.sputznik.io/wp-content/plugins/asian-dispatch-embed/public/embed.js"></script>
    <!-- ─── END SNIPPET ─────────── -->

  </div>

  <p class="status">
    Reported iframe height: <span id="iframe-height">waiting…</span>
  </p>

  <!-- Shows the height messages the resize script sends, so you can confirm
       the postMessage channel is working even if the iframe looks blank. -->
  <script>
    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'ad-embed-height') {
        document.getElementById('iframe-height').textContent = e.data.height + 'px (post ' + e.data.post + ')';
      }
    });
  </script>

</body>
</html>
